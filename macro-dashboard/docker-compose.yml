version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: macro-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macro_dashboard
    ports:
      - '5432:5432'
    volumes:
      - macro-dashboard-pg:/var/lib/postgresql/data

volumes:
  macro-dashboard-pg:
